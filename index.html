<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemPredict</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Playfair+Display:ital,wght@0,700;1,700&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
    <!-- Intro Animation Overlay -->
    <div id="intro-overlay">
        <div class="intro-box-container">
            <svg class="intro-box-svg" viewBox="0 0 520 120">
                <rect class="intro-box-rect" x="10" y="10" width="500" height="100" rx="15" ry="15" />
            </svg>
            <div class="intro-text" id="intro-text">
                <span class="intro-letter">C</span><span class="intro-letter">h</span><span class="intro-letter">e</span><span class="intro-letter">m</span><span class="intro-letter">P</span><span class="intro-letter">r</span><span class="intro-letter">e</span><span class="intro-letter">d</span><span class="intro-letter i-container">ı<span class="i-dot"></span></span><span class="intro-letter">c</span><span class="intro-letter">t</span>
            </div>
        </div>
    </div>

    <!-- Main Content (starts slightly hidden/transformed) -->
    <div id="main-content" style="opacity: 0; visibility: hidden;">
        <header>
            <h1 data-text="ChemPredict" id="main-title">ChemPredict</h1>
            <nav>
                <button class="tab-btn active" data-target="periodic-table">Periodic Table</button>
                <button class="tab-btn" data-target="reaction-predictor">Reaction Predictor</button>
            </nav>
        </header>

    <main>
        <section id="periodic-table" class="tab-content active">
            <h2>Interactive Periodic Table</h2>
            <div class="pt-container">
                <div class="pt-grid" id="pt-grid">
                    <!-- Elements injected via JS -->
                </div>
                <div class="pt-details" id="pt-details">
                    <h3 id="detail-name">Select an element</h3>
                    <p><strong>Symbol:</strong> <span id="detail-symbol">-</span></p>
                    <p><strong>Atomic No:</strong> <span id="detail-number">-</span></p>
                    <p><strong>Atomic Mass:</strong> <span id="detail-mass">-</span></p>
                    <p><strong>Uses:</strong> <span id="detail-uses">-</span></p>
                </div>
            </div>
        </section>

        <section id="reaction-predictor" class="tab-content">
            <h2>Reaction Predictor</h2>
            <div class="rp-container">
                <p class="rp-instructions">Enter reactants (e.g., HCl + NaOH) to predict the products and see the balanced equation.</p>
                <div class="rp-input-group">
                    <input type="text" id="rp-input" placeholder="e.g. HCl + NaOH" autocomplete="off">
                    <button class="rp-btn" id="rp-btn">Predict & Balance</button>
                </div>
                
                <div id="rp-output" class="rp-output">
                    <!-- Results injected here -->
                </div>
            </div>
        </section>
    </main>

    </div> <!-- Close #main-content -->
    <script src="script.js"></script>
</body>
</html>
